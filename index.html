<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Automation | Dashboard Interno</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1A1A1A;
            --border-color: rgba(254, 112, 67, 0.15);
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --accent-primary: #FE7043; /* Coral - EF Mendes palette */
            --accent-glow: rgba(254, 112, 67, 0.25);
            --accent-secondary: #DB3B3B;
            --glass-blur: blur(16px);
            --status-online: #10b981;
            --status-building: #FE7043;
            --status-maintenance: #DB3B3B;
            --card-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(254, 112, 67, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(219, 59, 59, 0.05) 0%, transparent 50%);
        }

        /* Ambient animated glow */
        .ambient-light {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            box-shadow: 0 0 20px 2px var(--accent-glow);
            animation: pulse-light 4s ease-in-out infinite;
            z-index: 100;
        }

        @keyframes pulse-light {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 80px 24px 40px;
            text-align: center;
            position: relative;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            display: inline-block;
            border-bottom: 2px solid var(--accent-primary);
            padding-bottom: 4px;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-primary) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: fade-in-up 0.8s ease-out forwards;
        }

        header p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            animation: fade-in-up 1s ease-out forwards;
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 0 24px 80px;
            flex: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
            perspective: 1000px;
        }

        /* Glassmorphic Card */
        .card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: 40px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: fade-in-up 0.6s ease-out forwards;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.7), 
                        0 0 20px -10px var(--accent-glow);
        }

        /* Card Header & Badge */
        .card-header {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .status-badge::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px currentColor;
        }

        /* Dynamic Status Colors via JS, Defaulting to Blue */
        .status-badge[data-status="Online"] { color: var(--status-online); border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.1); }
        .status-badge[data-status="Construção"] { color: var(--status-building); border-color: rgba(245, 158, 11, 0.3); background: rgba(245, 158, 11, 0.1); }
        .status-badge[data-status="Manutenção"] { color: var(--status-maintenance); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .card p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 32px;
            flex-grow: 1;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 24px;
            background: var(--accent-primary);
            border: none;
            border-radius: 50px; /* Pill shape like efmendes */
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: auto;
            position: relative;
            z-index: 1;
        }

        .card-link svg {
            width: 20px;
            height: 20px;
            margin-left: 10px;
            transition: transform 0.3s ease;
        }

        .card-link:hover {
            background: #fff;
            color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(1.05);
        }

        .card-link:hover svg {
            transform: translateX(4px) rotate(-45deg);
        }

        /* Loading / Error States */
        .message-container {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 24px;
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Delays for grid items */
        .delay-0 { animation-delay: 0.1s; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.4s; }

        /* Tech Tags */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tag {
            padding: 4px 12px;
            background: rgba(254, 112, 67, 0.1);
            border: 1px solid rgba(254, 112, 67, 0.2);
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--accent-primary);
            text-transform: uppercase;
        }

        /* Quick Tools Panel */
        .quick-tools {
            position: fixed;
            right: -320px;
            top: 100px;
            width: 300px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-right: none;
            border-radius: 20px 0 0 20px;
            backdrop-filter: var(--glass-blur);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            z-index: 1000;
            padding: 24px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .quick-tools.active {
            right: 0;
            border-color: var(--accent-primary);
        }

        .tools-toggle {
            position: absolute;
            left: -50px;
            top: 20px;
            width: 50px;
            height: 50px;
            background: var(--accent-primary);
            border: none;
            border-radius: 12px 0 0 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -5px 0 15px var(--accent-glow);
        }

        .tools-section {
            margin-bottom: 24px;
        }

        .tools-section h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-primary);
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(254, 112, 67, 0.2);
            padding-bottom: 4px;
        }

        .key-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .key-value {
            font-family: monospace;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
        }

        .btn-copy {
            background: transparent;
            border: 1px solid rgba(254, 112, 67, 0.3);
            color: var(--accent-primary);
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background: var(--accent-primary);
            color: white;
        }

        .quick-link {
            display: flex;
            align-items: center;
            color: var(--text-primary);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .quick-link:hover {
            background: rgba(255,255,255,0.05);
            color: var(--accent-primary);
        }

        .quick-link svg {
            margin-right: 10px;
            width: 16px;
            height: 16px;
        }

        .card-api-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .api-info-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .api-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 8px;
            min-width: 60px;
        }

        .api-value-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.15);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--glass-border);
            flex: 1;
            min-width: 0; /* Critical flex fix */
        }

        .api-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: #fff;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .api-value.hidden {
            filter: blur(4px);
            user-select: none;
        }

        .btn-toggle-eye {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .btn-toggle-eye:hover {
            color: var(--accent-primary);
        }

        .api-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
        }
        .btn-docs {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-top: 10px;
            width: 100%;
            justify-content: center;
        }

        .btn-docs:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .card-actions .card-link,
        .card-actions .btn-docs {
            margin-top: 0;
            padding: 10px 15px;
            font-size: 0.8rem;
            flex: 1;
        }

        @media (max-width: 1200px) {
            header h1 { font-size: 3rem; }
        }

        @media (max-width: 768px) {
            header { padding: 60px 20px 30px; }
            header h1 { font-size: 2.2rem; }
            header p { font-size: 1.1rem; }
            
            .grid { 
                grid-template-columns: 1fr; 
                gap: 24px; 
            }
            
            .card { padding: 30px; }
            
            .quick-tools {
                width: 280px;
                top: 0;
                height: 100vh;
                border-radius: 0;
            }
            
            .tools-toggle {
                top: 60px;
            }
        }

        @media (max-width: 480px) {
            header h1 { font-size: 1.8rem; }
            .card h3 { font-size: 1.3rem; }
            .card-link { padding: 14px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>

    <aside id="quick-tools" class="quick-tools">
        <button class="tools-toggle" onclick="toggleTools()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
        <div class="tools-section">
            <h4>Chaves de API</h4>
            <div class="key-item">
                <span class="key-value">N8N_API_KEY_...</span>
                <button class="btn-copy" onclick="copyKey('CHAVE_N8N_AQUI')">Copy</button>
            </div>
            <div class="key-item">
                <span class="key-value">SUPABASE_KEY_...</span>
                <button class="btn-copy" onclick="copyKey('CHAVE_SUPABASE_AQUI')">Copy</button>
            </div>
        </div>
        <div class="tools-section">
            <h4>Links Rápidos</h4>
            <a href="#" class="quick-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                n8n Editor
            </a>
            <a href="#" class="quick-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                Easypanel
            </a>
            <a href="docs.html" class="quick-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Documentação
            </a>
        </div>
    </aside>
    
    <header>
        <div class="logo">AI Automation</div>
        <h1>Dashboard de Projetos</h1>
        <p>Acesso rápido e gestão inteligente da nossa infraestrutura de automação.</p>
    </header>

    <main>
        <div id="projetos-grid" class="grid">
            <div class="message-container">
                <div class="loader"></div>
                <h2>Sincronizando projetos...</h2>
            </div>
        </div>
    </main>

    <script>
        const N8N_WEBHOOK_URL = 'https://agentes-n8n.cb16s5.easypanel.host/webhook/prod-api-manager-project';

        async function fetchProjetos() {
            const grid = document.getElementById('projetos-grid');

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error('Falha na requisição');
                
                let projetos = await response.json();
                
                // Tratar se return for { data: [...] } ou [...] 
                if (projetos.data && Array.isArray(projetos.data)) {
                    projetos = projetos.data;
                } else if (!Array.isArray(projetos)) {
                    projetos = [projetos];
                }

                grid.innerHTML = '';

                if (projetos.length === 0) {
                    grid.innerHTML = `
                        <div class="message-container">
                            <p style="color: var(--text-secondary); font-size: 1.2rem;">Nenhum projeto encontrado.</p>
                        </div>
                    `;
                    return;
                }

                projetos.forEach((projeto, index) => {
                    const status = projeto.Status || projeto['Status atual do projeto'] || 'Desconhecido';
                    const titulo = projeto.Titulo || 'Projeto sem Título';
                    const desc = projeto.Descrição || projeto.Descrução || 'Nenhuma descrição fornecida.';
                    const url = projeto.URL || '';
                    const tagsRaw = projeto.Tags || projeto.Tecnologias || projeto.Stack || 'n8n';
                    const tags = Array.isArray(tagsRaw) ? tagsRaw : tagsRaw.split(',').map(t => t.trim());
                    
                    const delayClass = `delay-${index % 4}`;

                    const card = document.createElement('div');
                    card.className = `card ${delayClass}`;
                    
                    let buttonHtml = '';
                    if (url && url !== '#' && url.trim() !== '') {
                        buttonHtml = `
                            <a href="${url}" target="_blank" rel="noopener noreferrer" class="card-link">
                                <span>Acessar Projeto</span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </a>
                        `;
                    }

                    const tagsHtml = tags.map(tag => `<span class="tag">${tag}</span>`).join('');

                    let apiHtml = '';
                    if (projeto.api_key) {
                        apiHtml = `
                            <div class="card-api-section">
                                <div class="api-info-item">
                                    <span class="api-label">Key Name</span>
                                    <div class="api-value-container">
                                        <span class="api-value">${projeto.api_key_name || titulo}</span>
                                    </div>
                                </div>
                                <div class="api-info-item">
                                    <span class="api-label">API Key</span>
                                    <div class="api-value-container">
                                        <span class="api-value hidden" id="key-${index}">${projeto.api_key}</span>
                                        <button class="btn-toggle-eye" onclick="toggleVisibility('key-${index}')">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                        </button>
                                        <button class="btn-copy" style="font-size: 10px; padding: 4px 8px;" onclick="copyKey('${projeto.api_key}')">Copy</button>
                                    </div>
                                </div>
                                ${projeto.api_key_description ? `
                                <div class="api-info-item">
                                    <span class="api-label">Finalidade</span>
                                    <p class="api-desc">${projeto.api_key_description}</p>
                                </div>` : ''}
                            </div>
                        `;
                    }

                    const docButtonHtml = `
                        <a href="project-doc.html?id=${projeto.id}" class="btn-docs">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Visualizar Documentação
                        </a>
                    `;

                    card.innerHTML = `
                        <div class="card-header">
                            <span class="status-badge" data-status="${status}">${status}</span>
                        </div>
                        <h3>${titulo}</h3>
                        <p>${desc}</p>
                        <div class="tags-container">
                            ${tagsHtml}
                        </div>
                        ${apiHtml}
                        <div class="card-actions">
                            ${buttonHtml}
                            ${docButtonHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Erro ao buscar dados:', error);
                grid.innerHTML = `
                    <div class="message-container">
                        <div class="error-icon">⚠️</div>
                        <h3 style="color: #ef4444; margin-bottom: 8px;">Conexão Falhou</h3>
                        <p style="color: var(--text-secondary);">Não foi possível carregar os projetos. Verifique a API do N8N e se há CORS ativado.</p>
                    </div>
                `;
            }
        }

        // Internal Tools Logic
        function toggleTools() {
            document.getElementById('quick-tools').classList.toggle('active');
        }

        function copyKey(value) {
            navigator.clipboard.writeText(value).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.style.background = '#10b981';
                btn.style.borderColor = '#10b981';
                btn.style.color = 'white';
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = '';
                    btn.style.borderColor = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        function toggleVisibility(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        }

        // Init
        document.addEventListener('DOMContentLoaded', fetchProjetos);
    </script>
</body>
</html>
